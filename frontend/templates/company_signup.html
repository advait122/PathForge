<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Signup</title>
    <link rel="stylesheet" href="/static/css/company_signup.css?v={{ asset_version|default('1') }}">
</head>
<body>
<header class="ribbon">
    <span class="ribbon-title">PathForge.</span>
</header>

<main class="company-signup-main">
    <div class="company-signup-layout">
        <aside class="company-signup-panel" aria-label="Company signup visual">
            <div class="company-signup-visual">
                <a class="company-signup-visual-link" href="/onboarding?mode=signup">sign in as student</a>
            </div>
        </aside>

        <section class="company-signup-card" aria-label="Company signup form">
            <h1>Company Signup</h1>

            {% if error %}
            <div class="status-banner status-error">{{ error }}</div>
            {% endif %}

            <form class="company-signup-form" method="post" action="/company/signup">
                <input id="signup-username" name="username" type="text" placeholder="Username" required>
                <input id="signup-password" name="password" type="password" placeholder="Password" required>
                <input id="signup-confirm-password" name="confirm_password" type="password" placeholder="Confirm Password" required>
                <button type="submit">Create Company Account</button>
            </form>

            <p class="alt-text">
                Already have a company account? <a class="text-link" href="/company/auth">Company login</a>
            </p>
        </section>
    </div>
</main>
</body>
</html>
